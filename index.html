<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>OVERMIND</title>
  <link rel="stylesheet" href="/src/ui/style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="vignette"></div>
  <div id="hud">
    <div id="hp-wrap"><div id="hp-bar"></div></div>
    <div id="wave-label"></div>
    <div id="boss-wrap" class="hidden">
      <div id="boss-name"></div>
      <div id="boss-bar-bg"><div id="boss-bar"></div></div>
    </div>
    <div id="taunt" class="hidden"></div>
    <div id="intermission" class="hidden"></div>
    <div id="report" class="hidden"></div>
    <div id="score"></div>
    <div id="numbers"></div>
    <div id="joy-base" class="hidden"><div id="joy-knob"></div></div>
    <button id="diag-btn" title="화면이 이상하면 눌러 개발자에게 전송">진단 전송</button>
  </div>
  <div id="screen" class="hidden">
    <h1 id="screen-title"></h1>
    <p id="screen-desc"></p>
    <button id="screen-btn">START</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
